<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contacto – Jean Marcos Jaen Arias</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header>
    <span class="logo">JM.</span>
    <nav>
      <a href="index.html">Inicio</a>
      <a href="sobremi.html">Sobre mí</a>
      <a href="proyectos.html">Proyectos</a>
      <a href="contacto.html" class="active">Contacto</a>
    </nav>
    <button id="toggleTema" class="btn-tema">🌙</button>
  </header>

  <div class="contenedor">
    <h2 class="titulo-seccion">Contacto</h2>

    <form id="formularioContacto">
      <div class="campo">
        <label for="nombre">Nombre *</label>
        <input type="text" id="nombre" placeholder="Tu nombre" />
        <span class="mensaje-error" id="error-nombre"></span>
      </div>

      <div class="campo">
        <label for="email">Correo electrónico *</label>
        <input type="email" id="email" placeholder="tucorreo@ejemplo.com" />
        <span class="mensaje-error" id="error-email"></span>
      </div>

      <div class="campo">
        <label for="mensaje">Mensaje *</label>
        <textarea id="mensaje" rows="5" placeholder="Escribe tu mensaje..."></textarea>
        <span class="mensaje-error" id="error-mensaje"></span>
      </div>

      <button type="submit" class="boton">Enviar</button>
      <p class="mensaje-ok" id="exito"></p>
    </form>
  </div>

  <footer>
    <p>© 2026 Jean Marcos Jaen Arias · IES Ana Luisa Benites</p>
  </footer>

  <button id="btnArriba">↑</button>

  <script src="js/tema.js"></script>
  <script src="js/scroll.js"></script>
  <script src="js/validacion.js"></script>
</body>
</html>
